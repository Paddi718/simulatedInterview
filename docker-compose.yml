services:
  postgres:
    image: postgres:15
    container_name: interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - interview-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - interview-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      ASR_MAX_CONCURRENT: ${ASR_MAX_CONCURRENT:-3}
      # ASR_PROVIDER / 在线 ASR 配置走 DB(system_configs)，管理员后台配置，不入 env
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      LLM_MODEL: ${LLM_MODEL}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-30}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-/var/data/interview-app/audio}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/var/data/interview-app/documents}
      RESUME_STORAGE_PATH: ${RESUME_STORAGE_PATH:-/var/data/interview-app/resumes}
    volumes:
      - app_data:/var/data/interview-app
      - ./models:/app/models
      - /var/log/nginx:/var/log/nginx:ro
    networks:
      - interview-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        # NEXT_PUBLIC_WS_URL 不设置 → getWsUrl() 自动从 window.location 派生
        - API_INTERNAL_URL=http://backend:8000
    container_name: interview-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # WS URL 由浏览器自动派生（不设置则用 window.location）
    networks:
      - interview-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pidof", "node"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  pgdata:
    name: interview-pgdata
  redis_data:
    name: interview-redis-data
  app_data:
    name: interview-app-data

networks:
  interview-net:
    name: interview-net
    driver: bridge
