version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: interview-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      ALIYUN_ASR_APP_KEY: ${ALIYUN_ASR_APP_KEY}
      ALIYUN_ASR_ACCESS_KEY_ID: ${ALIYUN_ASR_ACCESS_KEY_ID}
      ALIYUN_ASR_ACCESS_KEY_SECRET: ${ALIYUN_ASR_ACCESS_KEY_SECRET}
LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE: ${LLM_API_BASE}
      LLM_MODEL: ${LLM_MODEL}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH}
      RESUME_STORAGE_PATH: ${RESUME_STORAGE_PATH}
    volumes:
      - app_data:/var/data/interview-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
  app_data:
