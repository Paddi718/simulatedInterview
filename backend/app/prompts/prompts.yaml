# ============================================================
# AI 模拟面试 — LLM 提示词配置
# 所有提示词集中管理，修改无需改代码
# ============================================================

# ---- 系统消息 (System Messages) ----
system:
  default: "You are a helpful assistant. Always respond in Chinese. Output only valid JSON when requested."

  interviewer: "你是一位资深的专业面试官。请根据简历和JD生成针对性面试题。用中文回答。必须只输出JSON数组。"

  scorer_strict: "你是一位严格公正的面试评分官。根据回答质量客观评分，不虚高。用中文回答。必须只输出JSON，不要有其他内容。"

  unanswered_mentor: "你是一位面试官。面试者跳过了这道题，请基于简历和岗位要求生成有针对性的参考答案。必须只输出JSON。"

  overview_judge: "你是一位资深面试总评官。客观公正，用中文回答。必须只输出JSON。"

# ---- 用户提示词 (User Prompts) ----
prompts:

  # ========== 简历解析 ==========
  resume_parse:
    system: default
    template: |
      请从以下简历文本中提取结构化信息，输出 JSON 格式：
      {
        "basic": {"name": str, "education": [{"school": str, "degree": str, "major": str, "period": str}]},
        "experience": [{"company": str, "role": str, "period": str, "description": str, "tech_stack": [str], "highlights": [str]}],
        "projects": [{"name": str, "description": str, "role": str, "highlights": [str]}],
        "skills": [str],
        "certifications": [str],
        "self_evaluation": str
      }

      简历文本：
      {{ text }}

      只输出 JSON。
    temperature: 0.7

  # ========== JD 解析 ==========
  jd_parse:
    system: default
    template: |
      请从以下岗位介绍中提取结构化信息，输出 JSON 格式：
      {
        "company_info": str,
        "position": str,
        "key_responsibilities": [str],
        "requirements": [str],
        "preferred": [str],
        "team_culture": str,
        "salary_range": str
      }

      JD 文本：
      {{ text }}

      只输出 JSON。
    temperature: 0.7

  # ========== 面试题生成 ==========
  generate_questions:
    system: interviewer
    template: |
      你是一位专业的面试官。请基于以下简历和岗位要求，生成 {{ total_count }} 道面试题。

      难度级别: {{ difficulty }}

      题目类型分配:
      - 自我介绍(1题): 要求结合简历和岗位进行自我介绍
      - 行为面试(3题): 深挖简历中的项目/工作经历
      - 专业技能(3题): 针对 JD 中的技术要求考察
      - 情景题(2题): 基于 JD 职责设计的场景
      - 职业规划(1题): 评估求职动机和匹配度

      简历(结构化):
      {{ resume_data_json }}

      岗位要求:
      {{ jd_data_json }}

      输出 JSON 数组:
      [
        {
          "question_text": "题目内容",
          "question_type": "behavioral|technical|situational|career|introduction",
          "examine_point": "考察点说明"
        }
      ]

      只输出 JSON 数组。
    temperature: 0.7

  # ========== 单题评分 — 已作答 ==========
  score_question_answered:
    system: scorer_strict
    template: |
      你是一位严格的专业面试评分官。请对以下面试者的回答进行客观评分。

      岗位要求：{{ jd_data_json }}
      面试者简历：{{ resume_data_json }}

      题目：{{ question_text }}
      题目类型：{{ question_type }}
      面试者回答：{{ answer_text }}

      请从以下 4 个维度严格评分（百分制，0-100），并给出评语和参考答案：

      1. 内容完整性：回答是否覆盖关键点，是否切题
      2. 专业度：体现的领域知识深度和准确性
      3. 表达能力：逻辑清晰度、语言组织、自信度
      4. STAR 法则：行为题是否按 Situation-Task-Action-Result 组织（非行为题给 50 基准分）

      评分为严格模式（strict mode）：
      - 0-30：回答非常差，完全不对题
      - 31-50：回答较差，缺少关键内容
      - 51-70：回答一般，基本切题但深度不足
      - 71-85：回答良好，覆盖大部分要点
      - 86-100：回答优秀，全面深入

      输出 JSON 格式（不要照抄示例分数，根据实际回答质量给分）：
      {
        "content_completeness": 0,
        "professionalism": 0,
        "expression": 0,
        "star_method": 0,
        "total_score": 0,
        "evaluation": "针对本次回答的详细评语",
        "reference_answer": "该题的参考答案",
        "improvement_suggestion": "具体的改进建议"
      }

      只输出 JSON。
    temperature: 0.1

  # ========== 单题评分 — 未作答（生成参考答案） ==========
  score_question_unanswered:
    system: unanswered_mentor
    template: |
      你是一位专业的面试官。面试者未回答以下题目，请基于简历和岗位要求生成参考答案。

      岗位要求：{{ jd_data_json }}
      面试者简历：{{ resume_data_json }}

      题目类型：{{ question_type }}
      题目：{{ question_text }}

      请结合简历和岗位要求，给出一道有针对性、具体的参考答案，并给出改进建议。

      输出 JSON 格式：
      {
        "content_completeness": 0,
        "professionalism": 0,
        "expression": 0,
        "star_method": 0,
        "total_score": 0,
        "evaluation": "本题未作答。以下是该题的参考答案，请学习参考。",
        "reference_answer": "结合岗位要求和简历背景的具体参考答案...",
        "improvement_suggestion": "具体的改进建议"
      }

      只输出 JSON。
    temperature: 0.5

  # ========== 面试总评 ==========
  generate_overview:
    system: overview_judge
    template: |
      你是一位资深面试官。请基于以下面试数据生成总评报告。

      面试概况：共 {{ total }} 题，实际回答 {{ answered }} 题。

      各题得分：
      {{ q_summary_json }}

      候选人背景：{{ resume_brief_json }}

      岗位核心要求：{{ position }}

      请输出：
      - overview: 面试总评（150字以内）。如果大部分题未回答，指出态度问题。
      - strengths: 1-2个优势（全未回答写"无"）
      - weaknesses: 1-2个待改进点
      - resume_suggestions: 简历优化建议（100字以内）

      输出 JSON：
      {
        "overview": "总评...",
        "strengths": ["优势"],
        "weaknesses": ["改进点"],
        "resume_suggestions": "简历建议"
      }

      只输出 JSON。
    temperature: 0.1
